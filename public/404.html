<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Nitpreet Bamra</title>
    <script>
      // GitHub Pages serves this for unknown paths. Stash the intended
      // route and bounce to index.html, which restores it before React mounts.
      sessionStorage.setItem(
        'spa-redirect',
        location.pathname + location.search + location.hash
      );
      location.replace('/');
    </script>
  </head>
  <body></body>
</html>
